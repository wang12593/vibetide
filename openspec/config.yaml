schema: spec-driven

context: |
  项目：Vibetide (Vibe Media) — 中文 AI 驱动内容管理平台
  技术栈：Next.js 16.1.6 + React 19 + TypeScript 5 (strict) + Supabase PostgreSQL + Drizzle ORM 0.45.1
  AI SDK：Vercel AI SDK v6 (@ai-sdk/anthropic)
  UI：shadcn/ui (new-york) + Radix UI + Tailwind CSS v4 + Framer Motion + Lucide icons
  后台任务：Inngest (event-driven workflows)
  认证：Supabase Auth (email/password)
  Path alias：@/* → ./src/*
  所有 UI 文字为简体中文
  数据库：~145 表 / 54 schema 文件 / 72 枚举，multi-tenant via organization_id
  前后端分离：page.tsx (Server Component) → *-client.tsx (Client Component)
  DAL：src/lib/dal/ 只读查询，Server Actions：src/app/actions/ 写操作
  禁止从 Client Component 导入 DAL 代码
  设计系统：GlassCard / Button / Input / DataTable / SearchInput 等共享原语，禁止手写替代
  Git：单分支 main 开发，禁止 feature 分支和 worktree
  验证命令：npx tsc --noEmit && npm run build
  按钮和可点击元素不带边框

rules:
  proposal:
    - 包含回滚计划
    - 标注受影响的 DAL / Server Action / UI 组件
    - 区分 breaking change
  specs:
    - 每个 Requirement 至少包含一个 Scenario (WHEN/THEN 格式)
    - 使用 SHALL/MUST 表述规范性要求
    - 新增功能优先考虑复用现有共享组件
  design:
    - 遵循 Server/Client Component 分离模式
    - 新增数据库表必须包含 organization_id
    - 标注是否需要 force-dynamic
  tasks:
    - 每个任务必须明确涉及的具体文件路径
    - UI 任务引用具体共享组件
    - 数据库变更标注 schema 文件路径
